<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClipCloak</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="logo">🛡️</div>
    <div>
      <h1>ClipCloak</h1>
      <div class="sub">On-device PII redaction daemon</div>
    </div>
    <div id="statusDot" class="dot" title="status"></div>
  </header>

  <main>
    <section class="card">
      <div class="status-row">
        <span id="statusText">Starting…</span>
        <span id="portBadge" class="badge"></span>
      </div>
    </section>

    <section class="card">
      <h2>Connection</h2>
      <label for="port">Port</label>
      <input type="number" id="port" min="1024" max="65535" />
      <p id="portHint" class="hint hidden">Port change applies after you restart the app.</p>

      <label for="token">Access token</label>
      <div class="inline">
        <input type="text" id="token" placeholder="empty = unauthenticated (dev)" />
        <button id="genToken" class="ghost" type="button">Generate</button>
      </div>
      <p class="hint">Paste this same token into the extension's popup.</p>
    </section>

    <section class="card">
      <h2>Detection</h2>
      <label for="threshold">Threshold <span id="threshVal" class="mono"></span></label>
      <input type="range" id="threshold" min="0.30" max="0.90" step="0.01" />
      <p class="hint">Higher = fewer false positives, may miss some PII. ~0.55 is a good default.</p>
    </section>

    <section class="card">
      <h2>What to redact</h2>
      <div id="labels" class="labels"></div>
    </section>

    <section class="card row">
      <input type="checkbox" id="autostart" />
      <label for="autostart" class="checkbox-label">Launch at login</label>
    </section>
  </main>

  <footer>
    <span id="saveState" class="save-state"></span>
    <button id="save" type="button">Save</button>
  </footer>

  <script src="main.js"></script>
</body>
</html>
