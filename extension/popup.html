<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { font: 13px/1.5 system-ui, sans-serif; width: 300px; padding: 12px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 8px; }
  label { display: block; margin: 8px 0 2px; font-weight: 600; }
  input[type=text] { width: 100%; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  #status { margin-top: 8px; color: #555; }
  button { font: inherit; padding: 4px 10px; }
</style></head>
<body>
  <h1>PII Redactor</h1>
  <div class="row"><input type="checkbox" id="enabled"><label for="enabled" style="margin:0">Enabled</label></div>
  <label for="threshold">Detection threshold</label>
  <input type="text" id="threshold" placeholder="0.55">
  <label for="modelBaseUrl">Model base URL</label>
  <input type="text" id="modelBaseUrl" placeholder="https://…/fp16_v2">
  <div class="row"><button id="save">Save</button><button id="warm">Preload model</button></div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body></html>
