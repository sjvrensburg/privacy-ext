<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img class="logo" src="icons/icon-48.png" alt="" width="30" height="30" />
    <div>
      <h1>PII Redactor</h1>
      <div class="sub">On-device paste redaction</div>
    </div>
    <span id="chipDot" class="dot checking" title="Daemon status"></span>
  </header>

  <main>
    <section class="card">
      <h2>This site</h2>
      <div class="hostname" id="hostname">—</div>
      <label class="chip" id="originChip" style="margin-top:8px">
        <input type="checkbox" id="originToggle" />
        <span id="originChipText">Redact on this site</span>
      </label>
    </section>

    <section class="card row">
      <input type="checkbox" id="enabled" />
      <label for="enabled" class="checkbox-label">Enabled (master switch)</label>
    </section>

    <section class="card">
      <h2>Connection</h2>
      <div class="status-row">
        <span id="chipText">Checking…</span>
        <button id="repair" class="ghost small" type="button">Re-pair</button>
      </div>
    </section>

    <section class="card">
      <h2>Detection</h2>
      <label for="threshold">Threshold <span id="threshVal" class="mono"></span></label>
      <input type="range" id="threshold" min="0.30" max="0.90" step="0.01" />
      <p class="hint">Higher = fewer false positives, may miss some PII. ~0.55 is a good default.</p>
    </section>

    <section class="card">
      <h2>Auto-active sites</h2>
      <div id="siteList" class="labels"></div>
      <div class="hint">Sites redaction is on for by default. Toggle any site, including this one, above.</div>
    </section>
  </main>

  <footer>
    <span id="status" class="save-state"></span>
    <button id="test" class="ghost" type="button">Test connection</button>
    <button id="save" type="button">Save</button>
  </footer>

  <script src="ai-sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
