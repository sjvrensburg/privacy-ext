name: ci

# Fast regression checks on every push/PR (the heavy installer build lives in
# release.yml, tag-triggered). Two jobs:
#   * server-smoke  — boot clipcloak-server against the real model and assert the
#     health / auth / redaction contract the extension depends on.
#   * desktop-check — compile the Tauri app (no bundling) so a broken desktop
#     build is caught here instead of at release time.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # See release.yml for why this points at the int8 export.
  HF_REPO: stefanj0/gliner2-sa-names-lora
  ORT_VERSION: "1.20.1"

jobs:
  server-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # Cache the ~400 MB model (int8 encoder) so most runs skip the HF download entirely.
      - name: Cache model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: semplifica
          # Bump this suffix whenever the file *content* at onnx_int8/ changes on
          # the HF repo (the path never changes on re-upload, so the cache key
          # must, or stale weights silently persist across cache hits — this bit
          # us once already with the reduce_range fix, see git history).
          key: model-${{ env.HF_REPO }}-onnx_int8-v2-reduce_range

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --quiet "huggingface_hub"
          for attempt in 1 2 3 4 5; do
            hf download "$HF_REPO" \
              --include "onnx_int8/*" \
              --include "tokenizer.json" \
              --include "tokenizer_config.json" \
              --local-dir dl && break
            echo "hf download attempt $attempt failed; retrying in $((attempt*20))s"
            sleep $((attempt*20))
          done
          mkdir -p semplifica
          mv dl/onnx_int8/* semplifica/
          find dl -name 'tokenizer*.json' -exec cp -n {} semplifica/ \;
          test -f semplifica/tokenizer.json || { echo "::error::tokenizer.json missing"; exit 1; }

      - name: Fetch ONNX Runtime
        run: |
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          curl -fL --retry 3 -o ort.tgz "$url"
          tar xzf ort.tgz
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Build server
        run: cargo build --release --manifest-path server/Cargo.toml

      - name: Smoke test
        run: bash server/smoke-test.sh

  desktop-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # tauri-build validates the bundle.resources globs (from
      # tauri.linux.conf.json) and the externalBin sidecar path even on
      # `cargo check`, so stage placeholders to satisfy them — this job only
      # type-checks, it doesn't bundle.
      - name: Stage placeholder resources
        working-directory: desktop/src-tauri
        run: |
          mkdir -p resources/semplifica binaries
          touch resources/semplifica/placeholder resources/libonnxruntime.so
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          touch "binaries/clipcloak-native-host-${triple}"
          chmod +x "binaries/clipcloak-native-host-${triple}"

      - name: cargo check (desktop)
        working-directory: desktop/src-tauri
        run: cargo check

  # ---- Prune stale caches ----
  # This repo's Actions storage quota (0.5 GB, free plan) covers artifacts
  # AND caches combined. Swatinem/rust-cache mints a new cache per
  # Cargo.lock/toolchain hash and GitHub's own eviction (default 10 GB cap)
  # never kicks in at our much smaller quota, so caches silently pile up
  # (hit 6 GB / 13 caches once, which blocked release-build artifact
  # uploads for over a day even after the run that caused it was long
  # gone). Keep only the newest cache per key prefix (the part before the
  # trailing content-hash suffix) after every push to main.
  cleanup-caches:
    if: github.ref == 'refs/heads/main'
    needs: [server-smoke, desktop-check]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Prune old caches, keep newest per key prefix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/caches?per_page=100" \
            --paginate --jq '.actions_caches[] | [.id, .key, .created_at] | @tsv' \
          | awk -F'\t' '{ prefix = $2; sub(/-[0-9a-f]+-[0-9a-f]+$/, "", prefix); print prefix "\t" $0 }' \
          | sort -t$'\t' -k1,1 -k4,4r \
          | awk -F'\t' '{ if ($1 == prev) print $2; prev = $1 }' \
          | while read -r id; do
              echo "deleting stale cache id=$id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/caches/$id" || true
            done
