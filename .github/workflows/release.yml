name: release

# Builds the Privacy Redactor desktop installers (Linux .AppImage, Windows
# NSIS .exe) with the GLiNER2 model and the ONNX runtime bundled in, so an
# ordinary user installs one file and it just works — no model download, no
# runtime to install.
#
# The Windows .exe is shipped UNSIGNED. Free OSS Authenticode certs (OSSign etc.)
# require an established project reputation / history of real use, which this
# project does not yet have, so users will see a SmartScreen warning on first
# run. Revisit once the project has a track record (or budget for a paid EV/OV
# cert); the signing step would go in the build-windows job (see the TODO).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  # Model lives in this HF repo; the 8 ONNX fragments (int8 encoder, fp16 the
  # rest) are under onnx_int8/. Smaller + faster than the old fp16-only export
  # (encoder 337 MB vs 556 MB, ~2x throughput) — see stefanj0/gliner2-sa-names-lora
  # model card for the accuracy/perf tradeoff.
  HF_REPO: stefanj0/gliner2-sa-names-lora
  # ONNX Runtime version compatible with ort 2.0.0-rc.9 (ORT 1.20.x ABI).
  ORT_VERSION: "1.20.1"

jobs:
  # ---- 1. Fetch the model once, share it with the platform builds ----
  download-model:
    runs-on: ubuntu-latest
    steps:
      - name: Download model from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --quiet "huggingface_hub"
          # Retry to ride out transient HF 429/5xx rate limits.
          for attempt in 1 2 3 4 5; do
            hf download "$HF_REPO" \
              --include "onnx_int8/*" \
              --include "tokenizer.json" \
              --include "tokenizer_config.json" \
              --local-dir dl && break
            echo "hf download attempt $attempt failed; retrying in $((attempt*20))s"
            sleep $((attempt*20))
          done
          test -d dl/onnx_int8 || { echo "::error::model download failed after retries"; exit 1; }
          # Flatten into the layout the server expects (semplifica/ = 8 onnx +
          # tokenizer files, no subfolder). See CLAUDE.md "Model".
          # tokenizer*.json may sit at the repo root or inside onnx_int8/, so
          # collect them from anywhere in the download.
          mkdir -p semplifica
          mv dl/onnx_int8/* semplifica/
          find dl -name 'tokenizer*.json' -exec cp -n {} semplifica/ \;
          ls -lh semplifica
          test -f semplifica/tokenizer.json || { echo "::error::tokenizer.json missing"; exit 1; }
          ls semplifica/*.onnx >/dev/null || { echo "::error::no .onnx fragments"; exit 1; }

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: semplifica/
          retention-days: 1

  # ---- 2a. Linux: .AppImage ----
  build-linux:
    needs: download-model
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Stage model resource
        uses: actions/download-artifact@v4
        with:
          name: model
          path: desktop/src-tauri/resources/semplifica

      - name: Stage ONNX Runtime (.so)
        run: |
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          curl -fL --retry 3 -o ort.tgz "$url"
          tar xzf ort.tgz
          cp onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so \
             desktop/src-tauri/resources/libonnxruntime.so

      - name: Build native-messaging sidecar
        run: bash desktop/src-tauri/scripts/prepare-sidecar.sh

      - name: Build installer
        working-directory: desktop
        run: cargo tauri build --bundles appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 1

  # ---- 2b. Windows: NSIS .exe ----
  build-windows:
    needs: download-model
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Stage model resource
        uses: actions/download-artifact@v4
        with:
          name: model
          path: desktop/src-tauri/resources/semplifica

      - name: Stage ONNX Runtime (.dll)
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/onnxruntime-win-x64-$env:ORT_VERSION.zip"
          curl.exe -fL --retry 3 -o ort.zip $url
          Expand-Archive ort.zip -DestinationPath ort
          Copy-Item "ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll" `
            -Destination "desktop/src-tauri/resources/onnxruntime.dll"

      - name: Build native-messaging sidecar
        shell: bash
        run: bash desktop/src-tauri/scripts/prepare-sidecar.sh

      - name: Build installer
        working-directory: desktop
        run: cargo tauri build --bundles nsis

      # TODO(signing): the .exe ships unsigned — free OSS Authenticode certs need
      # a project reputation/usage history we don't have yet, so SmartScreen will
      # warn on first run. When a cert (free once reputable, or paid EV/OV) is
      # available, sign the .exe here (signtool / ossign CLI) before upload.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  # ---- 2c. Package the browser extensions (thin clients) ----
  package-extensions:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      # Guarantee the Firefox tree matches the Chrome source (only manifest.json
      # legitimately differs). Fail the release if a sync was forgotten, so the
      # two builds can never ship divergent logic.
      - name: Verify Firefox is in sync
        run: |
          ./scripts/sync-firefox.sh
          if ! git diff --quiet -- extension-firefox; then
            echo "::error::extension-firefox is stale — run scripts/sync-firefox.sh and commit."
            git --no-pager diff --stat -- extension-firefox
            exit 1
          fi

      # Chrome: a plain zip is what the Web Store dashboard ingests. NEVER ship
      # .keys/ or any .pem — that's the local signing secret for the pinned id.
      - name: Package Chrome zip
        run: |
          cd extension-client
          zip -rX "../pii-redactor-chrome-${GITHUB_REF_NAME}.zip" . \
            -x ".keys/*" "*.pem" ".gitignore" "README.md"

      # Firefox: web-ext lint catches manifest problems AMO would reject; build
      # emits an unsigned .xpi. Signing happens on AMO upload (or add a
      # `web-ext sign` step here once AMO_JWT_ISSUER/SECRET secrets exist).
      # <all_urls> + nativeMessaging surface as *warnings*, not errors, so lint
      # stays green; skim them once.
      - name: Package Firefox xpi
        run: |
          npx --yes web-ext@latest lint  --source-dir extension-firefox
          npx --yes web-ext@latest build --source-dir extension-firefox \
            --artifacts-dir dist-ff --overwrite-dest
          mv dist-ff/*.zip "pii-redactor-firefox-${GITHUB_REF_NAME}.xpi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extensions
          path: |
            pii-redactor-chrome-*.zip
            pii-redactor-firefox-*.xpi
          retention-days: 1

  # ---- 3. Attach everything to the GitHub Release ----
  release:
    needs: [build-linux, build-windows, package-extensions]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      # The three installers plus the two extension packages — NOT the raw
      # `model` artifact, which the installers already bundle (else the release
      # gets ~20 stray ONNX files attached).
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{*-installer*,browser-extensions}"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: true
