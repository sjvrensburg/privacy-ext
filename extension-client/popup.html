<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { font: 13px/1.5 system-ui, sans-serif; width: 300px; padding: 12px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 8px; }
  label { display: block; margin: 8px 0 2px; font-weight: 600; }
  input[type=text] { width: 100%; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  #status { margin-top: 8px; }
  .ok { color: #137333; } .err { color: #b00020; }
  button { font: inherit; padding: 4px 10px; }
  .chip { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; background: #f1f3f4; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; background: #9aa0a6; transition: background-color .2s; }
  .dot.connected { background: #1e8e3e; }
  .dot.disconnected { background: #d93025; }
  .dot.checking { background: #f9ab00; }
  #chipText { flex: 1; }
  #repair { padding: 2px 8px; font-size: 12px; }
</style></head>
<body>
  <h1>PII Redactor</h1>
  <div class="chip"><span id="chipDot" class="dot checking"></span><span id="chipText">Checking…</span><button id="repair" title="Re-pair with the daemon">Re-pair</button></div>
  <div class="row"><input type="checkbox" id="enabled"><label for="enabled" style="margin:0">Enabled</label></div>
  <label for="threshold">Detection threshold</label>
  <input type="text" id="threshold" placeholder="0.55">
  <div class="row"><button id="save">Save</button><button id="test">Test connection</button></div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body></html>
